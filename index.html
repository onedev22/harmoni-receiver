<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harmoni Cast Receiver Immersive</title>
  
  <script type="text/javascript" src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #07090e;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #ffffff;
    }

    /* * ENFOQUE PANTALLA COMPLETA INMERSIVA (Estilo Apple TV)
     * La carátula se expande al 100% con un blur ultra suave para generar el fondo líquido
     */
    #bg-liquid {
      position: fixed;
      top: -10%;
      left: -10%;
      width: 120%;
      height: 120%;
      z-index: -1;
      object-fit: cover;
      filter: blur(55px) brightness(0.45) saturate(1.6);
      transform: scale(1.1);
      transition: src 1s ease-in-out, opacity 0.8s ease;
      opacity: 0;
    }

    /* Player nativo de Cast oculto en el núcleo */
    cast-media-player {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0;
    }

    /* Contenedor principal: Todo el peso visual se tira hacia abajo */
    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: flex-end; /* Alinea los controles a la parte inferior */
      align-items: center;
      padding-bottom: 5rem; /* Espaciado cómodo para el marco del TV */
      background: linear-gradient(to top, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
    }

    /* CÁPSULA DE CRISTAL FLOTANTE (Glassmorphism Estilo Apple) */
    .glass-panel {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 30px;
      padding: 2.2rem 3rem;
      width: 90%;
      max-width: 1100px;
      display: flex;
      gap: 2.5rem;
      align-items: center;
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8),
                  inset 0 1px 0 rgba(255,255,255,0.2); /* Resplandor interno de cristal */
    }

    /* Mini-miniatura de carátula dentro del cristal */
    .mini-cover {
      width: 90px;
      height: 90px;
      background: rgba(255,255,255,0.03);
      border-radius: 14px;
      object-fit: cover;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.15);
      flex-shrink: 0;
      display: none;
    }

    .text-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* Contenedor para alinear Título + Artista y el Badge en una sola fila limpia */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1.2rem;
    }

    .meta-strings {
      flex: 1;
      min-width: 0;
    }

    .title {
      font-size: 2.2rem;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .artist {
      font-size: 1.3rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.65);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 0.1rem;
    }

    /* Badge de estado hiper-minimalista */
    .state-badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.12);
      padding: 0.3rem 0.9rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    /* Controles de línea de tiempo blanca sutil */
    .controls-area {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      width: 100%;
    }

    .progress-bar-bg {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      height: 6px;
      width: 100%;
      overflow: hidden;
    }

    .progress-fill {
      background: #ffffff;
      width: 0%;
      height: 100%;
      border-radius: 10px;
      transition: width 0.3s linear;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>

  <img id="bg-liquid" src="" alt="">

  <cast-media-player></cast-media-player>

  <div id="ui-overlay">
    <div class="glass-panel">
      
      <img id="coverImage" class="mini-cover" src="" alt="Carátula">
      
      <div class="text-info">
        
        <div class="header-row">
          <div class="meta-strings">
            <div class="title" id="mediaTitle">Harmoni</div>
            <div class="artist" id="mediaArtist">Conecta tu dispositivo...</div>
          </div>
          <div><span id="playerStateBadge" class="state-badge">En espera</span></div>
        </div>
        
        <div class="controls-area">
          <div class="progress-bar-bg"><div id="progressFill" class="progress-fill"></div></div>
          <div class="time-row">
            <span id="currentTime">0:00</span>
            <span id="durationTime">0:00</span>
          </div>
        </div>

      </div>

    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const context = cast.framework.CastReceiverContext.getInstance();
      const playerManager = context.getPlayerManager();

      // Referencias UI
      const bgLiquid      = document.getElementById('bg-liquid');
      const coverImg      = document.getElementById('coverImage');
      const titleEl       = document.getElementById('mediaTitle');
      const artistEl      = document.getElementById('mediaArtist');
      const badgeEl       = document.getElementById('playerStateBadge');
      const progressFill  = document.getElementById('progressFill');
      const currentTimeEl = document.getElementById('currentTime');
      const durationEl    = document.getElementById('durationTime');

      /* * NOTA DE PRODUCCIÓN: Se comentaron y removieron los sistemas de logs visuales
       * para optimizar el rendimiento en pantallas de TV comerciales.
       */

      function fmtTime(s) {
        if (!isFinite(s) || isNaN(s) || s < 0) return '0:00';
        var m = Math.floor(s / 60);
        var sec = Math.floor(s % 60);
        return m + ':' + String(sec).padStart(2, '0');
      }

      function updateUI() {
        var info = playerManager.getMediaInformation();
        if (!info) return;

        var meta = info.metadata || {};
        titleEl.textContent  = meta.title || 'Canción Desconocida';
        artistEl.textContent = meta.artist || meta.albumArtist || 'Artista Desconocido';
        
        var imgs = meta.images || [];
        if (imgs.length > 0 && imgs[0].url) {
          coverImg.src = imgs[0].url;
          coverImg.style.display = 'block';
          
          // Inyecta la carátula en pantalla completa con el gradiente líquido de CSS
          bgLiquid.src = imgs[0].url;
          bgLiquid.style.opacity = '1';
        } else {
          coverImg.style.display = 'none';
          bgLiquid.style.opacity = '0';
        }

        var dur = info.duration || 0;
        durationEl.textContent = fmtTime(dur);
      }

      function updateProgress() {
        var cur = playerManager.getCurrentTimeSec() || 0;
        var info = playerManager.getMediaInformation();
        var dur = info ? (info.duration || 0) : 0;
        
        currentTimeEl.textContent = fmtTime(cur);
        
        if (dur > 0) {
          var pct = (cur / dur) * 100;
          progressFill.style.width = Math.min(100, Math.max(0, pct)) + '%';
        }
      }

      function updateBadge() {
        var s = playerManager.getPlayerState();
        var map = {
          'PLAYING': 'Reproduciendo',
          'PAUSED': 'Pausado',
          'BUFFERING': 'Cargando',
          'IDLE': 'En espera'
        };
        badgeEl.textContent = map[s] || 'Listo';
      }

      // Interceptor de Handshake para streams de audio
      playerManager.setMessageInterceptor(
        cast.framework.messages.MessageType.LOAD,
        function(loadRequestData) {
          // Log interno comentado para producción
          // console.log('LOAD recibido');
          
          if (!loadRequestData || !loadRequestData.media) {
            return loadRequestData;
          }

          if (!loadRequestData.media.contentType) {
            loadRequestData.media.contentType = 'audio/mpeg'; 
          }

          return loadRequestData;
        }
      );

      // Eventos del reproductor
      playerManager.addEventListener(cast.framework.events.EventType.MEDIA_STATUS, function() {
        updateUI();
        updateBadge();
        updateProgress();
      });

      playerManager.addEventListener(cast.framework.events.EventType.TIME_UPDATE, function() {
        updateProgress();
      });

      playerManager.addEventListener(cast.framework.events.EventType.ERROR, function(e) {
        // Error manejado de manera silenciosa en la interfaz
        badgeEl.textContent = 'Error';
      });

      // Loop asíncrono para refrescar la barra de tiempo (250ms)
      setInterval(function() {
        if (playerManager.getPlayerState() === 'PLAYING') {
          updateProgress();
        }
      }, 250);

      // Parámetros de inicialización de Google Cast
      const options = new cast.framework.CastReceiverOptions();
      options.maxInactivity = 3600; 

      context.start(options);

    })();
  </script>
</body>
</html>
