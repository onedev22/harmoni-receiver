<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harmoni TV Receiver</title>
  <!-- Google Cast Receiver SDK v3 - MUST be first script -->
  <script type="text/javascript" src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --glass-bg: rgba(10, 10, 12, 0.65);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #ffffff;
      --text-sub: rgba(255, 255, 255, 0.6);
      --accent: #4f46e5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #030303;
      overflow: hidden;
    }

    /* cast-media-player is the ROOT element - it must fill the screen
       The SDK uses it to signal READY state to the sender */
    cast-media-player {
      display: block;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      /* Hide the default built-in UI, but keep element alive */
      --theme-hue: 260;
      --background-image: url('');
    }

    /* Our custom overlay sits on top of cast-media-player */
    #harmoni-overlay {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 10;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text-main);
      background: #030303;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── Animated Aurora Background ─── */
    #ambient-container {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    #bg-blur-img {
      position: absolute;
      inset: -10%;
      width: 120%;
      height: 120%;
      background-size: cover;
      background-position: center;
      filter: blur(80px) saturate(1.8) brightness(0.35);
      transition: background-image 1.2s ease;
      opacity: 0.85;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.18;
      animation: blobFloat 12s ease-in-out infinite;
    }

    .blob-1 {
      width: 45vw; height: 45vw;
      top: -10%;  left: -10%;
      background: radial-gradient(circle, #4f46e5, transparent);
      animation-delay: 0s;
    }

    .blob-2 {
      width: 50vw; height: 50vw;
      bottom: -15%; right: -15%;
      background: radial-gradient(circle, #f43f5e, transparent);
      animation-delay: -5s;
    }

    .blob-3 {
      width: 35vw; height: 35vw;
      top: 40%; left: 45%;
      background: radial-gradient(circle, #06b6d4, transparent);
      animation-delay: -9s;
    }

    #bg-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(3,3,3,0.75) 100%);
    }

    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(3vw, -3vh) scale(1.08); }
      66% { transform: translate(-2vw, 4vh) scale(0.94); }
    }

    /* ─── Status badge (top-right) ─── */
    #status-badge {
      position: absolute;
      top: 48px;
      right: 64px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 8px 18px 8px 12px;
      backdrop-filter: blur(16px);
    }

    #status-badge-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }

    #status-badge span {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.5px;
    }

    /* ─── Idle / Waiting Screen ─── */
    #idle-screen {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }

    .logo-container {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(79,70,229,0.4);
      animation: ringPulse 3s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.1); opacity: 0.9; }
    }

    .logo-icon {
      font-size: 52px;
      animation: iconFloat 4s ease-in-out infinite;
    }

    @keyframes iconFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .app-name {
      font-family: 'Outfit', sans-serif;
      font-size: 64px;
      font-weight: 800;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #a5b4fc 0%, #818cf8 50%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 20px;
      color: var(--text-sub);
      font-weight: 300;
    }

    #spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Player Card ─── */
    #player-card {
      position: relative;
      z-index: 10;
      display: none;
      align-items: center;
      gap: 80px;
      width: 100%;
      max-width: 1400px;
      padding: 0 80px;
    }

    #player-card.visible { display: flex; }

    /* Album Art */
    #album-art-container {
      position: relative;
      flex-shrink: 0;
    }

    #album-art-shadow {
      position: absolute;
      inset: -20px;
      border-radius: 28px;
      background-size: cover;
      background-position: center;
      filter: blur(40px) saturate(1.6);
      opacity: 0.6;
      z-index: -1;
    }

    #album-art {
      width: 360px;
      height: 360px;
      border-radius: 20px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.12);
      display: block;
      transition: opacity 0.4s ease;
    }

    #album-art.loading { opacity: 0.3; }

    /* Info Column */
    #info-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 0;
    }

    #branding {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #branding-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4f46e5;
      box-shadow: 0 0 10px #4f46e5;
    }

    #branding-dot.paused { background: #6b7280; box-shadow: none; }

    #branding-text {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #song-title {
      font-family: 'Outfit', sans-serif;
      font-size: 56px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #artist-name {
      font-size: 24px;
      font-weight: 400;
      color: var(--text-sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Progress */
    #progress-container { display: flex; flex-direction: column; gap: 8px; }

    #progress-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4f46e5, #818cf8);
      border-radius: 4px;
      transition: width 1s linear;
    }

    #time-row {
      display: flex;
      justify-content: space-between;
    }

    .time-label {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      font-variant-numeric: tabular-nums;
    }

    /* Controls Row */
    #controls-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #play-state-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(79,70,229,0.15);
      border: 1px solid rgba(79,70,229,0.25);
      border-radius: 40px;
      padding: 8px 18px;
    }

    #play-state-indicator svg {
      width: 16px;
      height: 16px;
      fill: #818cf8;
    }

    #play-state-text {
      font-size: 14px;
      font-weight: 600;
      color: #818cf8;
    }

    .ctrl-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      transition: background 0.3s;
    }

    .ctrl-badge.active { background: rgba(79,70,229,0.2); border-color: rgba(79,70,229,0.4); }
    .ctrl-badge svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.45); }
    .ctrl-badge.active svg { fill: #818cf8; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- REQUIRED by CAF SDK: must be the first element in body, no inline CSS hiding -->
  <cast-media-player></cast-media-player>

  <!-- Harmoni Custom Overlay -->
  <div id="harmoni-overlay">

    <!-- Dynamic blurred/aurora background -->
    <div id="ambient-container">
      <div id="bg-blur-img"></div>
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
      <div id="bg-vignette"></div>
    </div>

    <!-- Casting status badge (always visible) -->
    <div id="status-badge">
      <div id="status-badge-dot"></div>
      <span id="status-text">Casting</span>
    </div>

    <!-- Idle / waiting screen -->
    <div id="idle-screen">
      <div class="logo-container">
        <div class="logo-ring"></div>
        <div class="logo-icon">🎵</div>
      </div>
      <div class="app-name">Harmoni</div>
      <div class="tagline">Conectado y listo para reproducir</div>
      <div id="spinner"></div>
    </div>

    <!-- Glassmorphism Player Card -->
    <div id="player-card">
      <!-- Album art with glowing blur shadow -->
      <div id="album-art-container">
        <div id="album-art-shadow"></div>
        <img id="album-art" src="" alt="Cover Art" class="loading">
      </div>

      <!-- Details Column -->
      <div id="info-column">
        <div id="branding">
          <div id="branding-dot"></div>
          <span id="branding-text">Harmoni Music</span>
        </div>

        <h1 id="song-title">—</h1>
        <h2 id="artist-name">—</h2>

        <!-- Progress Slider -->
        <div id="progress-container">
          <div id="progress-track">
            <div id="progress-fill"></div>
          </div>
          <div id="time-row">
            <span id="time-current" class="time-label">0:00</span>
            <span id="time-total" class="time-label">0:00</span>
          </div>
        </div>

        <!-- Controls indicators (visual only) -->
        <div id="controls-row">
          <div id="play-state-indicator">
            <svg id="indicator-icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="indicator-icon-pause" viewBox="0 0 24 24" class="hidden"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            <span id="play-state-text">Reproduciendo</span>
          </div>
          <div class="ctrl-badge" id="badge-shuffle" title="Shuffle">
            <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.42 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
          </div>
          <div class="ctrl-badge" id="badge-repeat" title="Repeat">
            <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Initialize Cast SDK Receiver
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    // DOM Elements
    const bgBlurImg = document.getElementById('bg-blur-img');
    const idleScreen = document.getElementById('idle-screen');
    const playerCard = document.getElementById('player-card');
    const spinner = document.getElementById('spinner');
    const albumArt = document.getElementById('album-art');
    const albumArtShadow = document.getElementById('album-art-shadow');
    const songTitle = document.getElementById('song-title');
    const artistName = document.getElementById('artist-name');
    const progressFill = document.getElementById('progress-fill');
    const timeCurrent = document.getElementById('time-current');
    const timeTotal = document.getElementById('time-total');
    const statusText = document.getElementById('status-text');
    const brandingDot = document.getElementById('branding-dot');
    const indicatorIconPlay = document.getElementById('indicator-icon-play');
    const indicatorIconPause = document.getElementById('indicator-icon-pause');
    const playStateText = document.getElementById('play-state-text');
    const badgeShuffle = document.getElementById('badge-shuffle');
    const badgeRepeat = document.getElementById('badge-repeat');

    // Time Formatter (mm:ss)
    function formatTime(seconds) {
      if (!seconds || isNaN(seconds) || seconds < 0) return '0:00';
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function showPlayerCard() {
      idleScreen.style.display = 'none';
      playerCard.classList.add('visible');
    }

    function showIdleScreen(loading) {
      idleScreen.style.display = 'flex';
      playerCard.classList.remove('visible');
      spinner.style.display = loading ? 'block' : 'none';
      bgBlurImg.style.backgroundImage = '';
    }

    // Update UI based on playback status
    function updateUI(mediaStatus) {
      if (!mediaStatus) return;

      const media = mediaStatus.media || {};
      const metadata = media.metadata || {};
      const images = metadata.images || [];

      const title = metadata.title || 'Canción Desconocida';
      const artist = metadata.artist || metadata.albumArtist || 'Artista Desconocido';
      const imgUrl = images.length > 0 ? images[0].url : null;
      const duration = media.duration || 0;
      const current = mediaStatus.currentTime || 0;

      songTitle.textContent = title;
      artistName.textContent = artist;
      timeCurrent.textContent = formatTime(current);
      timeTotal.textContent = formatTime(duration);

      if (duration > 0) {
        progressFill.style.width = `${(current / duration) * 100}%`;
      } else {
        progressFill.style.width = '0%';
      }

      const isPlaying = mediaStatus.playerState === 'PLAYING';
      const isPaused = mediaStatus.playerState === 'PAUSED';
      const isBuffering = mediaStatus.playerState === 'BUFFERING';

      if (isPlaying) {
        indicatorIconPlay.classList.add('hidden');
        indicatorIconPause.classList.remove('hidden');
        playStateText.textContent = 'Reproduciendo';
        playerCard.classList.add('playing');
        brandingDot.classList.remove('paused');
        statusText.textContent = 'En Reproducción';
      } else {
        indicatorIconPlay.classList.remove('hidden');
        indicatorIconPause.classList.add('hidden');
        playStateText.textContent = isPaused ? 'Pausado' : 'Conectado';
        playerCard.classList.remove('playing');
        brandingDot.classList.add('paused');
        statusText.textContent = isPaused ? 'En Pausa' : 'Conectado';
      }

      if (isBuffering) {
        statusText.textContent = 'Cargando...';
        playStateText.textContent = 'Cargando';
      }

      if (imgUrl && albumArt.src !== imgUrl) {
        albumArt.classList.add('loading');
        albumArt.onload = () => albumArt.classList.remove('loading');
        albumArt.src = imgUrl;
        albumArtShadow.style.backgroundImage = `url('${imgUrl}')`;
        bgBlurImg.style.backgroundImage = `url('${imgUrl}')`;
      }

      if (mediaStatus.mediaCustomData) {
        const custom = mediaStatus.mediaCustomData;
        if (custom.isShuffle !== undefined) {
          badgeShuffle.classList.toggle('active', !!custom.isShuffle);
        }
        if (custom.repeatMode !== undefined) {
          badgeRepeat.classList.toggle('active', custom.repeatMode > 0);
        }
      }
    }

    // ── SDK Event Listeners ──────────────────────────────────────────────────

    playerManager.addEventListener(
      cast.framework.events.EventType.PLAYER_LOADING,
      () => {
        showIdleScreen(true);
        statusText.textContent = 'Cargando...';
      }
    );

    playerManager.addEventListener(
      cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
      () => {
        showPlayerCard();
        const mi = playerManager.getMediaInformation();
        if (mi) {
          updateUI({ media: mi, currentTime: 0, playerState: 'PLAYING' });
        }
      }
    );

    playerManager.addEventListener(
      cast.framework.events.EventType.MEDIA_STATUS,
      (event) => {
        const ms = event.mediaStatus;
        if (!ms) return;
        if (ms.media) {
          showPlayerCard();
          updateUI(ms);
        } else if (ms.playerState === 'IDLE') {
          showIdleScreen(false);
        }
      }
    );

    playerManager.addEventListener(
      cast.framework.events.EventType.PLAYER_PLAYBACK_ENDED,
      () => showIdleScreen(false)
    );

    // Smooth time ticker
    setInterval(() => {
      try {
        const state = playerManager.getPlayerState ? playerManager.getPlayerState() : null;
        const pos = playerManager.getCurrentTimeSec ? playerManager.getCurrentTimeSec() : 0;
        const mi = playerManager.getMediaInformation ? playerManager.getMediaInformation() : null;
        if (mi && state === 'PLAYING') {
          const duration = mi.duration || 0;
          timeCurrent.textContent = formatTime(pos);
          if (duration > 0) {
            progressFill.style.width = `${(pos / duration) * 100}%`;
          }
        }
      } catch (e) { /* safe */ }
    }, 1000);

    // ── Start Receiver ───────────────────────────────────────────────────────
    // This MUST be called after all listeners are registered
    context.start();
  </script>
</body>
</html>
