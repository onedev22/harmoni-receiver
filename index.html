<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cast Receiver Pro</title>
  <!-- SDK del receptor de Cast (v3) — OBLIGATORIO cargar PRIMERO -->
  <script type="text/javascript" src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <!-- Cast Debug Logger — ayuda a ver errores internos del SDK -->
  <script src="https://www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0c10;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #eef;
    }

    /*
     * CRITICO: cast-media-player DEBE ocupar todo el espacio disponible.
     * Nunca usar display:none ni width/height de 1px.
     * Nuestro overlay se posiciona ENCIMA del player.
     */
    cast-media-player {
      display: block;
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      background: #0a0c10;
    }

    /* Overlay con toda nuestra UI personalizada, flotando sobre el player */
    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      pointer-events: none; /* No bloquear eventos de click al player */
    }

    /* Panel inferior de info */
    .info-panel {
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 80%, transparent 100%);
      padding: 2rem 1.5rem 1.5rem;
    }

    .metadata {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .cover {
      width: 80px;
      height: 80px;
      background: #2a2e3a;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }

    .text-info {
      flex: 1;
      min-width: 0;
    }

    .title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .artist {
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 0.4rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .state-badge {
      display: inline-block;
      background: rgba(44, 62, 102, 0.8);
      padding: 0.15rem 0.7rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-weight: bold;
      color: #bbd9ff;
    }

    .progress-area {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .progress-bar-bg {
      background: rgba(255,255,255,0.15);
      border-radius: 1rem;
      height: 4px;
      overflow: hidden;
    }

    .progress-fill {
      background: #1e88e5;
      width: 0%;
      height: 100%;
      transition: width 0.5s linear;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
    }

    /* Log de eventos — esquina inferior derecha pequeño */
    .events-log {
      position: fixed;
      bottom: 0.5rem;
      right: 0.8rem;
      width: 360px;
      background: rgba(0,0,0,0.75);
      border-radius: 8px;
      padding: 0.5rem 0.8rem;
      font-family: monospace;
      font-size: 0.65rem;
      max-height: 140px;
      overflow-y: auto;
      color: #5fdd9d;
      z-index: 20;
      pointer-events: none;
    }

    .events-log h4 {
      margin: 0 0 0.3rem 0;
      color: #aaa;
      font-size: 0.7rem;
    }

    .error-marker {
      color: #ff8866;
    }
  </style>
</head>
<body>

  <!--
    CRITICO: <cast-media-player> debe estar en el body, visible y con espacio real.
    El SDK de Cast lo necesita para renderizar el video/audio y completar el handshake.
    NUNCA usar display:none ni dimensiones de 1px.
  -->
  <cast-media-player></cast-media-player>

  <!-- Nuestra UI personalizada superpuesta ENCIMA del player -->
  <div id="ui-overlay">
    <div class="info-panel">
      <div class="metadata">
        <img id="coverImage" class="cover" src="" alt="carátula">
        <div class="text-info">
          <div class="title" id="mediaTitle">Harmoni</div>
          <div class="artist" id="mediaArtist">Esperando conexión...</div>
          <div><span id="playerStateBadge" class="state-badge">⚫ En espera</span></div>
        </div>
      </div>
      <div class="progress-area">
        <div class="progress-bar-bg"><div id="progressFill" class="progress-fill"></div></div>
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="durationTime">0:00</span>
        </div>
      </div>
    </div>
  </div>

  <div class="events-log">
    <h4>📡 Receptor</h4>
    <div id="eventLogContainer">🟢 Iniciado. Esperando...</div>
  </div>

  <script>
    // Capturar errores globales ANTES de ejecutar cualquier código del SDK
    window.onerror = function(msg, url, line) {
      const d = document.getElementById('eventLogContainer');
      if (d) {
        d.innerHTML += '<div class="error-marker">🚨 JS: ' + msg + ' (L' + line + ')</div>';
        d.scrollTop = d.scrollHeight;
      }
    };

    (function() {
      'use strict';

      // -----------------------------------------------
      // 1. INSTANCIAS DEL SDK
      // -----------------------------------------------
      const context = cast.framework.CastReceiverContext.getInstance();
      const playerManager = context.getPlayerManager();

      // Activar debug logger para ver errores internos del SDK en chrome://inspect
      try {
        const dbg = cast.debug.CastDebugLogger.getInstance();
        dbg.setEnabled(true);
        dbg.loggerLevelByEvents = {
          'cast.framework.events.category.CORE': cast.framework.LoggerLevel.INFO,
          'cast.framework.events.EventType.MEDIA_STATUS': cast.framework.LoggerLevel.DEBUG
        };
      } catch(e) { /* debug logger no disponible */ }

      // -----------------------------------------------
      // 2. REFERENCIAS UI
      // -----------------------------------------------
      const coverImg      = document.getElementById('coverImage');
      const titleEl       = document.getElementById('mediaTitle');
      const artistEl      = document.getElementById('mediaArtist');
      const badgeEl       = document.getElementById('playerStateBadge');
      const progressFill  = document.getElementById('progressFill');
      const currentTimeEl = document.getElementById('currentTime');
      const durationEl    = document.getElementById('durationTime');
      const logDiv        = document.getElementById('eventLogContainer');

      function addLog(msg, isErr) {
        const t = new Date().toLocaleTimeString();
        const cls = isErr ? 'error-marker' : '';
        const icon = isErr ? '❌' : '📌';
        logDiv.innerHTML += '<div class="' + cls + '">' + icon + ' [' + t + '] ' + msg + '</div>';
        logDiv.scrollTop = logDiv.scrollHeight;
        // Limitar a 60 entradas
        while (logDiv.children.length > 60) logDiv.removeChild(logDiv.firstChild);
      }

      function fmtTime(s) {
        if (!isFinite(s) || isNaN(s)) return 'En vivo';
        var h = Math.floor(s / 3600);
        var m = Math.floor((s % 3600) / 60);
        var sec = Math.floor(s % 60);
        if (h > 0) return h + ':' + pad(m) + ':' + pad(sec);
        return m + ':' + pad(sec);
      }
      function pad(n) { return String(n).padStart(2, '0'); }

      function updateUI() {
        var info = playerManager.getMediaInformation();
        if (!info) {
          titleEl.textContent = 'Harmoni';
          artistEl.textContent = 'Esperando contenido...';
          coverImg.src = '';
          return;
        }
        var meta = info.metadata || {};
        titleEl.textContent  = meta.title || info.contentId || 'Sin título';
        artistEl.textContent = meta.artist || meta.albumArtist || meta.subtitle || 'Artista desconocido';
        var imgs = meta.images || [];
        coverImg.src = (imgs.length > 0 && imgs[0].url) ? imgs[0].url : '';

        var dur = info.duration || 0;
        durationEl.textContent = (dur === Infinity) ? '🔴 En vivo' : fmtTime(dur);
        updateProgress();
      }

      function updateProgress() {
        var info = playerManager.getMediaInformation();
        if (!info) return;
        var cur  = playerManager.getCurrentTimeSec() || 0;
        var dur  = info.duration || 0;
        var pct  = (dur > 0 && isFinite(dur)) ? (cur / dur * 100) : 0;
        progressFill.style.width = Math.min(100, Math.max(0, pct)) + '%';
        currentTimeEl.textContent = (info.live) ? '🔴 DIRECTO' : fmtTime(cur);
      }

      function updateBadge() {
        var s = playerManager.getPlayerState();
        var map = {
          'PLAYING': '▶️ Reproduciendo',
          'PAUSED': '⏸️ Pausado',
          'BUFFERING': '⏳ Buffering...',
          'IDLE': '💤 Inactivo'
        };
        badgeEl.textContent = map[s] || '⏹️ Detenido';
      }

      // -----------------------------------------------
      // 3. EVENTOS DEL PLAYER
      // -----------------------------------------------
      playerManager.setMessageInterceptor(
        cast.framework.messages.MessageType.LOAD,
        function(req) {
          var url = (req.media && (req.media.contentUrl || req.media.contentId)) || '?';
          addLog('LOAD → ' + url.substring(0, 80));
          return req;
        }
      );

      playerManager.addEventListener(cast.framework.events.EventType.LOAD_START, function() {
        addLog('Cargando contenido...');
        updateUI();
        updateBadge();
      });

      playerManager.addEventListener(cast.framework.events.EventType.MEDIA_STATUS, function(e) {
        if (e.mediaStatus) {
          updateUI();
          updateBadge();
          updateProgress();
        }
      });

      playerManager.addEventListener(cast.framework.events.EventType.PLAYER_STATE_CHANGED, function(e) {
        addLog('Estado → ' + e.playerState);
        updateBadge();
        updateProgress();
      });

      playerManager.addEventListener(cast.framework.events.EventType.TIME_UPDATE, function() {
        updateProgress();
      });

      playerManager.addEventListener(cast.framework.events.EventType.ERROR, function(e) {
        var msg = e.detailedErrorCode ? 'Código: ' + e.detailedErrorCode
                : (e.error ? (e.error.message || String(e.error)) : 'Error desconocido');
        addLog('ERROR: ' + msg, true);
        badgeEl.textContent = '❌ Error';
      });

      playerManager.addEventListener(cast.framework.events.EventType.MEDIA_FINISHED, function() {
        addLog('Reproducción finalizada');
        updateBadge();
        updateProgress();
      });

      // Actualizar barra cada 500ms cuando está reproduciendo
      setInterval(function() {
        if (playerManager.getPlayerState() === 'PLAYING') updateProgress();
      }, 500);

      // -----------------------------------------------
      // 4. INICIAR EL RECEPTOR
      // -----------------------------------------------
      var opts = new cast.framework.CastReceiverOptions();
      opts.maxInactivity = 3600;

      context.start(opts);
      addLog('✅ context.start() — receptor listo');

    })();
  </script>
</body>
</html>
