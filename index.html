<!DOCTYPE html>
<html>
<head>
  <script type="text/javascript" src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <style>
    /* cast-media-player MUST NOT be display:none — but we shrink it to 1px */
    cast-media-player {
      position: fixed;
      width: 1px;
      height: 1px;
      top: 0;
      left: 0;
      overflow: hidden;
      z-index: 0;
    }
    body {
      background: #000;
      color: #0f0;
      font-family: monospace;
      font-size: 18px;
      padding: 30px;
      margin: 0;
      position: relative;
      z-index: 1;
    }
    #status { color: #ff0; font-size: 22px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    #img-preview { width: 120px; height: 120px; object-fit: cover; border: 2px solid #0f0; margin: 10px 0; display: block; }
    .label { color: #888; font-size: 14px; }
    .value { color: #fff; font-size: 20px; margin-bottom: 16px; word-break: break-all; }
    #raw { color: #555; font-size: 12px; margin-top: 30px; white-space: pre-wrap; }
    #events { color: #0af; font-size: 14px; margin-top: 20px; }
  </style>
</head>
<body>
  <!-- REQUIRED: first in body, no CSS hiding -->
  <cast-media-player></cast-media-player>

  <div id="status">⏳ Receptor iniciado — esperando datos...</div>

  <div class="label">TÍTULO:</div>
  <div class="value" id="v-title">—</div>

  <div class="label">ARTISTA:</div>
  <div class="value" id="v-artist">—</div>

  <div class="label">IMAGEN URL:</div>
  <div class="value" id="v-imgurl">—</div>
  <img id="img-preview" src="" alt="">

  <div class="label">ESTADO REPRODUCTOR:</div>
  <div class="value" id="v-state">—</div>

  <div class="label">URL DEL STREAM:</div>
  <div class="value" id="v-url">—</div>

  <div class="label">TIEMPO ACTUAL / DURACIÓN:</div>
  <div class="value" id="v-time">—</div>

  <div id="events"><b>EVENTOS SDK:</b><br></div>

  <div class="label">DATOS CRUDOS (mediaStatus):</div>
  <div id="raw">—</div>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    const status   = document.getElementById('status');
    const vTitle   = document.getElementById('v-title');
    const vArtist  = document.getElementById('v-artist');
    const vImgUrl  = document.getElementById('v-imgurl');
    const imgEl    = document.getElementById('img-preview');
    const vState   = document.getElementById('v-state');
    const vUrl     = document.getElementById('v-url');
    const vTime    = document.getElementById('v-time');
    const eventsEl = document.getElementById('events');
    const rawEl    = document.getElementById('raw');

    function logEvent(msg) {
      eventsEl.innerHTML += '→ ' + msg + '<br>';
    }

    function updateDebugUI(ms) {
      if (!ms) return;
      const media    = ms.media || {};
      const meta     = media.metadata || {};
      const images   = meta.images || [];
      const imgUrl   = images.length > 0 ? images[0].url : '(sin imagen)';
      const duration = media.duration || 0;
      const current  = ms.currentTime || 0;

      vTitle.textContent  = meta.title || '(sin título)';
      vArtist.textContent = meta.artist || meta.albumArtist || '(sin artista)';
      vImgUrl.textContent = imgUrl;
      imgEl.src           = imgUrl !== '(sin imagen)' ? imgUrl : '';
      vState.textContent  = ms.playerState || '(sin estado)';
      vUrl.textContent    = media.contentId || media.contentUrl || '(sin URL)';
      vTime.textContent   = `${Math.round(current)}s / ${Math.round(duration)}s`;

      rawEl.textContent = JSON.stringify(ms, null, 2);
      status.textContent = '✅ Datos recibidos';
    }

    // Intercept LOAD to see full request
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (request) => {
        logEvent('LOAD intercepted: ' + JSON.stringify(request).substring(0, 200));
        return request;
      }
    );

    playerManager.addEventListener(
      cast.framework.events.EventType.PLAYER_LOADING,
      () => { logEvent('PLAYER_LOADING'); status.textContent = '⏳ Cargando...'; }
    );

    playerManager.addEventListener(
      cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
      () => {
        logEvent('PLAYER_LOAD_COMPLETE');
        const mi = playerManager.getMediaInformation();
        if (mi) updateDebugUI({ media: mi, currentTime: 0, playerState: playerManager.getPlayerState() });
      }
    );

    playerManager.addEventListener(
      cast.framework.events.EventType.MEDIA_STATUS,
      (event) => {
        if (event.mediaStatus) {
          logEvent('MEDIA_STATUS: state=' + event.mediaStatus.playerState);
          updateDebugUI(event.mediaStatus);
        }
      }
    );

    playerManager.addEventListener(
      cast.framework.events.EventType.ERROR,
      (event) => {
        logEvent('ERROR: ' + JSON.stringify(event));
        status.textContent = '❌ Error: ' + JSON.stringify(event.detailedErrorCode || event);
      }
    );

    playerManager.addEventListener(
      cast.framework.events.EventType.PLAYER_PLAYBACK_ENDED,
      () => { logEvent('PLAYBACK_ENDED'); }
    );

    context.start();
    logEvent('context.start() llamado — receptor listo');
    status.textContent = '✅ Receptor listo — esperando conexión del celular...';
  </script>
</body>
</html>
