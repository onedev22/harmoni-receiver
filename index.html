<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harmoni Cast Receiver Immersive</title>
  
  <script type="text/javascript" src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  
  <style>
    /* RESET DE PANTALLA COMPLETA */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050507;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #ffffff;
    }

    /* FONDO LÍQUIDO DINÁMICO CON BLUR PREMIUM */
    #bg-liquid {
      position: fixed;
      top: -10%;
      left: -10%;
      width: 120%;
      height: 120%;
      z-index: 1;
      object-fit: cover;
      filter: blur(80px) brightness(0.45) saturate(1.7);
      transform: scale(1.05);
      transition: src 1s ease-in-out, opacity 1s ease;
      opacity: 0;
    }

    /* Capa de contraste degradada para legibilidad */
    .ambient-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(5, 5, 7, 0.2) 0%, rgba(5, 5, 7, 0.5) 50%, rgba(5, 5, 7, 0.85) 100%);
      z-index: 2;
    }

    /* Player nativo oculto de Cast */
    cast-media-player {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0;
    }

    /* CONTENEDOR PRINCIPAL DE LA UI */
    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      /* Eliminamos space-between para controlar los espacios manualmente y evitar pérdidas */
      justify-content: flex-start; 
      padding: 5vh 6vw; /* Usamos porcentajes de pantalla para asegurar zonas seguras */
    }

    /* CABECERA (Solo el badge derecho) */
    .cast-header {
      display: flex;
      justify-content: flex-end;
      width: 100%;
      height: 10vh;
      align-items: center;
    }

    .device-name {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1rem;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.08);
      padding: 8px 20px;
      border-radius: 30px;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* CUERPO CENTRAL (Arte + Textos alineados) */
    .cast-body {
      display: flex;
      align-items: center;
      gap: 5vw;
      height: 60vh; /* Forzamos un alto límite para dejarle espacio real a la barra inferior */
      width: 100%;
    }

    .main-album-art {
      /* Escalado responsivo basado en la altura de la TV */
      width: 45vh; 
      height: 45vh;
      max-width: 360px;
      max-height: 360px;
      border-radius: 24px;
      object-fit: cover;
      box-shadow: 0 35px 70px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.02);
      flex-shrink: 0;
      transition: opacity 0.5s ease;
    }

    .track-details {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
      flex: 1;
    }

    .tag-now-playing {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    /* TÍTULO AUTOREGULABLE PARA EVITAR DESBORDES EN TV */
    .title {
      font-size: 4.2vw; 
      font-weight: 800;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -1.5px;
      line-height: 1.15;
    }

    .artist {
      font-size: 2rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 10px;
    }

    .state-badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.08);
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.05);
      width: fit-content;
    }

    /* CONTROLES INFERIORES ASENTADOS SIMULTÁNEAMENTE */
    .bottom-player-area {
      width: 100%;
      height: 20vh; /* Reservamos espacio garantizado dentro del Viewport */
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin-top: auto; /* Empuja el bloque a la base de la zona segura */
    }

    /* Línea de tiempo de extremo a extremo */
    .controls-area {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      width: 100%;
    }

    .progress-bar-bg {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      height: 6px;
      width: 100%;
    }

    .progress-fill {
      background: rgba(255, 255, 255, 0.9);
      width: 0%;
      height: 100%;
      border-radius: 10px;
      position: relative;
    }

    /* Puntero deslizante blanco */
    .progress-fill::after {
      content: '';
      position: absolute;
      right: -6px;
      top: -3px;
      width: 12px;
      height: 12px;
      background: #ffffff;
      border-radius: 50%;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 1rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.35);
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>

  <img id="bg-liquid" src="" alt="">
  <div class="ambient-overlay"></div>

  <cast-media-player></cast-media-player>

  <div id="ui-overlay">
    
    <header class="cast-header">
        <div class="device-name">Pantalla de TV</div>
    </header>

    <main class="cast-body">
        <img id="coverImage" class="main-album-art" src="" alt="" style="opacity: 0;">
        
        <div class="track-details">
            <span class="tag-now-playing">Sonando Ahora</span>
            <div class="title" id="mediaTitle">Harmoni</div>
            <div class="artist" id="mediaArtist">Conecta tu dispositivo...</div>
            <div><span id="playerStateBadge" class="state-badge">En espera</span></div>
        </div>
    </main>

    <footer class="bottom-player-area">
      
      <div class="controls-area">
        <div class="progress-bar-bg">
            <div id="progressFill" class="progress-fill"></div>
        </div>
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="durationTime">0:00</span>
        </div>
      </div>

    </footer>

  </div>

  <script>
    (function() {
      'use strict';

      const context = cast.framework.CastReceiverContext.getInstance();
      const playerManager = context.getPlayerManager();

      // Enlaces del DOM
      const bgLiquid      = document.getElementById('bg-liquid');
      const coverImg      = document.getElementById('coverImage');
      const titleEl       = document.getElementById('mediaTitle');
      const artistEl      = document.getElementById('mediaArtist');
      const badgeEl       = document.getElementById('playerStateBadge');
      const progressFill  = document.getElementById('progressFill');
      const currentTimeEl = document.getElementById('currentTime');
      const durationEl    = document.getElementById('durationTime');

      function fmtTime(s) {
        if (!isFinite(s) || isNaN(s) || s < 0) return '0:00';
        var m = Math.floor(s / 60);
        var sec = Math.floor(s % 60);
        return m + ':' + String(sec).padStart(2, '0');
      }

      function updateUI() {
        var info = playerManager.getMediaInformation();
        if (!info) return;

        var meta = info.metadata || {};
        titleEl.textContent  = meta.title || 'Canción Desconocida';
        artistEl.textContent = meta.artist || meta.albumArtist || 'Artista Desconocido';
        
        var imgs = meta.images || [];
        if (imgs.length > 0 && imgs[0].url) {
          coverImg.src = imgs[0].url;
          coverImg.style.opacity = '1';
          
          bgLiquid.src = imgs[0].url;
          bgLiquid.style.opacity = '1';
        } else {
          coverImg.style.opacity = '0';
          bgLiquid.style.opacity = '0';
        }

        var dur = info.duration || 0;
        durationEl.textContent = fmtTime(dur);
      }

      function updateProgress() {
        var cur = playerManager.getCurrentTimeSec() || 0;
        var info = playerManager.getMediaInformation();
        var dur = info ? (info.duration || 0) : 0;
        
        currentTimeEl.textContent = fmtTime(cur);
        
        if (dur > 0) {
          var pct = (cur / dur) * 100;
          progressFill.style.width = Math.min(100, Math.max(0, pct)) + '%';
        }
      }

      function updateBadge() {
        var s = playerManager.getPlayerState();
        var map = {
          'PLAYING': 'Reproduciendo',
          'PAUSED': 'Pausado',
          'BUFFERING': 'Cargando',
          'IDLE': 'En espera'
        };
        badgeEl.textContent = map[s] || 'Listo';
      }

      // Interceptor de Handshake para audio streams
      playerManager.setMessageInterceptor(
        cast.framework.messages.MessageType.LOAD,
        function(loadRequestData) {
          if (!loadRequestData || !loadRequestData.media) {
            return loadRequestData;
          }
          if (!loadRequestData.media.contentType) {
            loadRequestData.media.contentType = 'audio/mpeg'; 
          }
          return loadRequestData;
        }
      );

      // Sincronización de Eventos de Cast SDK a UI
      playerManager.addEventListener(cast.framework.events.EventType.MEDIA_STATUS, function() {
        updateUI();
        updateBadge();
        updateProgress();
      });

      playerManager.addEventListener(cast.framework.events.EventType.TIME_UPDATE, function() {
        updateProgress();
      });

      playerManager.addEventListener(cast.framework.events.EventType.ERROR, function(e) {
        badgeEl.textContent = 'Error';
      });

      // Refresco constante del timeline fluido (250ms)
      setInterval(function() {
        if (playerManager.getPlayerState() === 'PLAYING') {
          updateProgress();
        }
      }, 250);

      const options = new cast.framework.CastReceiverOptions();
      options.maxInactivity = 3600; 

      context.start(options);

    })();
  </script>
</body>
  </html>
