<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Harmoni Cast Receiver</title>
  <script type="text/javascript" src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0c10;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #eef;
    }

    cast-media-player {
      display: block;
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      background: #0a0c10;
    }

    /* Overlay con toda nuestra UI personalizada, flotando sobre el player */
    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      pointer-events: none; 
    }

    /* Panel inferior de info */
    .info-panel {
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 80%, transparent 100%);
      padding: 2.5rem 2rem 2rem;
    }

    .metadata {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .cover {
      width: 90px;
      height: 90px;
      background: #2a2e3a;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      flex-shrink: 0;
    }

    .text-info {
      flex: 1;
      min-width: 0;
    }

    .title {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .artist {
      font-size: 1.1rem;
      color: #b3b3b3;
      margin-bottom: 0.5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .state-badge {
      display: inline-block;
      background: rgba(30, 136, 229, 0.25);
      padding: 0.2rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: bold;
      color: #64b5f6;
      border: 1px solid rgba(30, 136, 229, 0.4);
    }

    .progress-area {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .progress-bar-bg {
      background: rgba(255,255,255,0.15);
      border-radius: 1rem;
      height: 6px;
      overflow: hidden;
    }

    .progress-fill {
      background: #1e88e5;
      width: 0%;
      height: 100%;
      transition: width 0.3s linear;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
    }

    /* Log de eventos */
    .events-log {
      position: fixed;
      top: 1rem;
      right: 1rem;
      width: 320px;
      background: rgba(0,0,0,0.85);
      border-radius: 8px;
      padding: 0.6rem;
      font-family: monospace;
      font-size: 0.7rem;
      max-height: 200px;
      overflow-y: auto;
      color: #5fdd9d;
      z-index: 20;
      border: 1px solid rgba(255,255,255,0.05);
      pointer-events: none;
    }

    .events-log h4 {
      margin: 0 0 0.3rem 0;
      color: #aaa;
    }

    .error-marker {
      color: #ff8866;
    }
  </style>
</head>
<body>

  <cast-media-player></cast-media-player>

  <div id="ui-overlay">
    <div class="info-panel">
      <div class="metadata">
        <img id="coverImage" class="cover" src="" alt="carátula" style="display:none;">
        <div class="text-info">
          <div class="title" id="mediaTitle">Harmoni</div>
          <div class="artist" id="mediaArtist">Esperando conexión...</div>
          <div><span id="playerStateBadge" class="state-badge">⚫ En espera</span></div>
        </div>
      </div>
      <div class="progress-area">
        <div class="progress-bar-bg"><div id="progressFill" class="progress-fill"></div></div>
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="durationTime">0:00</span>
        </div>
      </div>
    </div>
  </div>

  <div class="events-log">
    <h4>📡 Harmoni Receiver Log</h4>
    <div id="eventLogContainer">🟢 Sistema listo...</div>
  </div>

  <script>
    window.onerror = function(msg, url, line) {
      const d = document.getElementById('eventLogContainer');
      if (d) {
        d.innerHTML += '<div class="error-marker">🚨 JS: ' + msg + ' (L' + line + ')</div>';
        d.scrollTop = d.scrollHeight;
      }
    };

    (function() {
      'use strict';

      const context = cast.framework.CastReceiverContext.getInstance();
      const playerManager = context.getPlayerManager();

      // Referencias UI
      const coverImg      = document.getElementById('coverImage');
      const titleEl       = document.getElementById('mediaTitle');
      const artistEl      = document.getElementById('mediaArtist');
      const badgeEl       = document.getElementById('playerStateBadge');
      const progressFill  = document.getElementById('progressFill');
      const currentTimeEl = document.getElementById('currentTime');
      const durationEl    = document.getElementById('durationTime');
      const logDiv        = document.getElementById('eventLogContainer');

      function addLog(msg, isErr) {
        const t = new Date().toLocaleTimeString();
        const cls = isErr ? 'error-marker' : '';
        logDiv.innerHTML += '<div class="' + cls + '">📌 [' + t + '] ' + msg + '</div>';
        logDiv.scrollTop = logDiv.scrollHeight;
      }

      function fmtTime(s) {
        if (!isFinite(s) || isNaN(s) || s < 0) return '0:00';
        var m = Math.floor(s / 60);
        var sec = Math.floor(s % 60);
        return m + ':' + String(sec).padStart(2, '0');
      }

      function updateUI() {
        var info = playerManager.getMediaInformation();
        if (!info) return;

        var meta = info.metadata || {};
        titleEl.textContent  = meta.title || 'Canción Desconocida';
        artistEl.textContent = meta.artist || meta.albumArtist || 'Artista Desconocido';
        
        var imgs = meta.images || [];
        if (imgs.length > 0 && imgs[0].url) {
          coverImg.src = imgs[0].url;
          coverImg.style.display = 'block';
        } else {
          coverImg.style.display = 'none';
        }

        var dur = info.duration || 0;
        durationEl.textContent = fmtTime(dur);
      }

      function updateProgress() {
        var cur = playerManager.getCurrentTimeSec() || 0;
        var info = playerManager.getMediaInformation();
        var dur = info ? (info.duration || 0) : 0;
        
        currentTimeEl.textContent = fmtTime(cur);
        
        if (dur > 0) {
          var pct = (cur / dur) * 100;
          progressFill.style.width = Math.min(100, Math.max(0, pct)) + '%';
        }
      }

      function updateBadge() {
        var s = playerManager.getPlayerState();
        var map = {
          'PLAYING': '▶️ Reproduciendo',
          'PAUSED': '⏸️ Pausado',
          'BUFFERING': '⏳ Cargando...',
          'IDLE': '💤 En espera'
        };
        badgeEl.textContent = map[s] || '⚫ Desconectado';
      }

      // -----------------------------------------------
      // CORRECCIÓN DEL INTERCEPTOR CRÍTICO
      // -----------------------------------------------
      playerManager.setMessageInterceptor(
        cast.framework.messages.MessageType.LOAD,
        function(loadRequestData) {
          addLog('Petición LOAD recibida de Harmoni');
          
          if (!loadRequestData || !loadRequestData.media) {
            addLog('Error: Petición de carga vacía', true);
            return loadRequestData;
          }

          // Forzar que el Chromecast entienda que es flujos de audio nativos
          if (!loadRequestData.media.contentType) {
            loadRequestData.media.contentType = 'audio/mpeg'; 
          }

          addLog('Cargando pista: ' + (loadRequestData.media.contentId || 'Streaming'));
          return loadRequestData; // Retornamos el objeto mutado de forma segura
        }
      );

      // Eventos del Ciclo de Vida
      playerManager.addEventListener(cast.framework.events.EventType.LOAD_START, function() {
        addLog('Iniciando decodificación de audio...');
      });

      playerManager.addEventListener(cast.framework.events.EventType.MEDIA_STATUS, function() {
        updateUI();
        updateBadge();
        updateProgress();
      });

      playerManager.addEventListener(cast.framework.events.EventType.TIME_UPDATE, function() {
        updateProgress();
      });

      playerManager.addEventListener(cast.framework.events.EventType.ERROR, function(e) {
        addLog('Error del Player: ' + (e.detailedErrorCode || 'Desconocido'), true);
        badgeEl.textContent = '❌ Error de códec';
      });

      // Bucle de renderizado para asegurar suavidad en la barra de progreso
      setInterval(function() {
        if (playerManager.getPlayerState() === 'PLAYING') {
          updateProgress();
        }
      }, 250);

      // -----------------------------------------------
      // CONFIGURACIÓN DE ARRANQUE PARA AUDIO (HARMONI)
      // -----------------------------------------------
      const options = new cast.framework.CastReceiverOptions();
      
      // Desactivar el apagado automático rápido para dar tiempo en pausa
      options.maxInactivity = 3600; 

      context.start(options);
      addLog('🚀 Receptor Harmoni inicializado con éxito');

    })();
  </script>
</body>
</html>
