<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harmoni Cast Receiver Immersive</title>
  
  <script type="text/javascript" src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* RESET DE PANTALLA COMPLETA */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050507;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #ffffff;
    }

    /* 1. EL EFECTO LÍQUIDO AMBIENTAL DE FONDO (Extraído por Cast JS) */
    #bg-liquid {
      position: fixed;
      top: -10%;
      left: -10%;
      width: 120%;
      height: 120%;
      z-index: 1;
      object-fit: cover;
      /* Configuración ideal de desenfoque y saturación inteligente */
      filter: blur(90px) brightness(0.5) saturate(1.8);
      transform: scale(1.05);
      transition: src 1s ease-in-out, opacity 1s ease;
      opacity: 0;
    }

    /* Capa de contraste degradada para evitar que encandile en pantallas OLED/LED */
    .ambient-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(5, 5, 7, 0.3) 0%, rgba(5, 5, 7, 0.75) 60%, rgba(5, 5, 7, 0.95) 100%);
      z-index: 2;
    }

    /* Player nativo oculto de Google Cast */
    cast-media-player {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0;
    }

    /* 2. CONTENEDOR PRINCIPAL DE COMPONENTES VISUALES */
    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 60px 80px; /* Safe Area para televisión */
    }

    /* CABECERA MINIMALISTA (Estilo Cast / Conexión) */
    .cast-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cast-status {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255, 255, 255, 0.45);
      font-size: 1.1rem;
      font-weight: 500;
    }

    .cast-status i {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.3rem;
    }

    .device-name {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.1rem;
      background: rgba(255, 255, 255, 0.05);
      padding: 8px 20px;
      border-radius: 30px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    /* ENFOQUE DEL CONTENIDO: CARÁTULA GIGANTE + METADATOS */
    .cast-body {
      display: flex;
      align-items: center;
      gap: 60px;
      margin-top: -20px;
      width: 100%;
    }

    .main-album-art {
      width: 320px;
      height: 320px;
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 35px 70px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(255, 255, 255, 0.02);
      flex-shrink: 0;
      transition: opacity 0.5s ease;
    }

    .track-details {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .tag-now-playing {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .title {
      font-size: 4.6rem; /* Enorme para visualización a larga distancia */
      font-weight: 800;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -1.5px;
      line-height: 1.1;
    }

    .artist {
      font-size: 2.2rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Badge de estado sincronizado con el reproductor */
    .state-badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.08);
      padding: 6px 14px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.05);
      width: fit-content;
      margin-top: 4px;
    }

    /* 3. CAPSULA DE CONTROLES ADAPTADA (Integración Cromática Absoluta) */
    .glass-panel {
      background: rgba(255, 255, 255, 0.02); 
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 28px;
      padding: 30px 45px;
      backdrop-filter: blur(35px) saturate(130%);
      -webkit-backdrop-filter: blur(35px) saturate(130%);
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }

    /* Fila superior de la cápsula */
    .controls-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .btn-action {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.45);
      font-size: 1.25rem;
    }

    /* El ícono dinámico central de reproducción */
    .btn-play-tv {
      background-color: #ffffff;
      color: #050507;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.3rem;
      box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15);
    }

    /* Control de volumen sutil */
    .volume-container {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .volume-rail {
      width: 110px;
      height: 5px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
    }

    .volume-track {
      width: 75%; /* Volumen por defecto simulado visualmente */
      height: 100%;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 3px;
    }

    /* Fila inferior: Línea de tiempo refinada */
    .controls-area {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      width: 100%;
    }

    .progress-bar-bg {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      height: 6px;
      width: 100%;
    }

    .progress-fill {
      background: rgba(255, 255, 255, 0.85);
      width: 0%;
      height: 100%;
      border-radius: 10px;
      position: relative;
    }

    /* El puntero deslizante de reproducción */
    .progress-fill::after {
      content: '';
      position: absolute;
      right: -6px;
      top: -3px;
      width: 12px;
      height: 12px;
      background: #ffffff;
      border-radius: 50%;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.35);
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>

  <img id="bg-liquid" src="" alt="">
  <div class="ambient-overlay"></div>

  <cast-media-player></cast-media-player>

  <div id="ui-overlay">
    
    <header class="cast-header">
        <div class="cast-status">
            <i class="fa-solid fa-chromecast"></i>
            <span>Harmoni Cast Receiver</span>
        </div>
        <div class="device-name">
            <i class="fa-solid fa-tv"></i> Pantalla de TV
        </div>
    </header>

    <main class="cast-body">
        <img id="coverImage" class="main-album-art" src="" alt="" style="opacity: 0;">
        
        <div class="track-details">
            <span class="tag-now-playing">Sonando Ahora</span>
            <div class="title" id="mediaTitle">Harmoni</div>
            <div class="artist" id="mediaArtist">Conecta tu dispositivo desde la app...</div>
            <span id="playerStateBadge" class="state-badge">En espera</span>
        </div>
    </main>

    <div class="glass-panel">
      
      <div class="controls-row">
          <div class="ctrl-group">
              <button class="btn-action"><i class="fa-regular fa-heart"></i></button>
              <button class="btn-action"><i class="fa-solid fa-folder-plus"></i></button>
              <button class="btn-action"><i class="fa-solid fa-arrow-up-right-from-square"></i></button>
          </div>

          <div class="ctrl-group">
              <button class="btn-action"><i class="fa-solid fa-shuffle"></i></button>
              <button class="btn-action"><i class="fa-solid fa-backward-step"></i></button>
              <div class="btn-play-tv" id="playIconContainer">
                  <i class="fa-solid fa-play" id="playIcon"></i>
              </div>
              <button class="btn-action"><i class="fa-solid fa-forward-step"></i></button>
              <button class="btn-action"><i class="fa-solid fa-repeat"></i></button>
          </div>

          <div class="ctrl-group volume-container">
              <button class="btn-action"><i class="fa-solid fa-volume-high"></i></button>
              <div class="volume-rail">
                  <div class="volume-track"></div>
              </div>
          </div>
      </div>

      <div class="controls-area">
        <div class="progress-bar-bg">
            <div id="progressFill" class="progress-fill"></div>
        </div>
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="durationTime">0:00</span>
        </div>
      </div>

    </div>

  </div>

  <script>
    (function() {
      'use strict';

      const context = cast.framework.CastReceiverContext.getInstance();
      const playerManager = context.getPlayerManager();

      // Referencias de elementos de Interfaz
      const bgLiquid      = document.getElementById('bg-liquid');
      const coverImg      = document.getElementById('coverImage');
      const titleEl       = document.getElementById('mediaTitle');
      const artistEl      = document.getElementById('mediaArtist');
      const badgeEl       = document.getElementById('playerStateBadge');
      const progressFill  = document.getElementById('progressFill');
      const currentTimeEl = document.getElementById('currentTime');
      const durationEl    = document.getElementById('durationTime');
      const playIcon      = document.getElementById('playIcon');

      function fmtTime(s) {
        if (!isFinite(s) || isNaN(s) || s < 0) return '0:00';
        var m = Math.floor(s / 60);
        var sec = Math.floor(s % 60);
        return m + ':' + String(sec).padStart(2, '0');
      }

      function updateUI() {
        var info = playerManager.getMediaInformation();
        if (!info) return;

        var meta = info.metadata || {};
        titleEl.textContent  = meta.title || 'Canción Desconocida';
        artistEl.textContent = meta.artist || meta.albumArtist || 'Artista Desconocido';
        
        var imgs = meta.images || [];
        if (imgs.length > 0 && imgs[0].url) {
          // Asigna la carátula a la imagen principal
          coverImg.src = imgs[0].url;
          coverImg.style.opacity = '1';
          
          // Asigna e inyecta la misma carátula al fondo líquido desenfocado
          bgLiquid.src = imgs[0].url;
          bgLiquid.style.opacity = '1';
        } else {
          coverImg.style.opacity = '0';
          bgLiquid.style.opacity = '0';
        }

        var dur = info.duration || 0;
        durationEl.textContent = fmtTime(dur);
      }

      function updateProgress() {
        var cur = playerManager.getCurrentTimeSec() || 0;
        var info = playerManager.getMediaInformation();
        var dur = info ? (info.duration || 0) : 0;
        
        currentTimeEl.textContent = fmtTime(cur);
        
        if (dur > 0) {
          var pct = (cur / dur) * 100;
          progressFill.style.width = Math.min(100, Math.max(0, pct)) + '%';
        }
      }

      function updateBadgeAndButtons() {
        var s = playerManager.getPlayerState();
        
        // Sincroniza el badge de estado
        var map = {
          'PLAYING': 'Reproduciendo',
          'PAUSED': 'Pausado',
          'BUFFERING': 'Cargando',
          'IDLE': 'En espera'
        };
        badgeEl.textContent = map[s] || 'Listo';

        // Cambia dinámicamente el ícono del botón central blanco (Play / Pause)
        if (s === 'PLAYING') {
          playIcon.className = 'fa-solid fa-pause';
          playIcon.parentElement.style.paddingLeft = '0px'; // Centrado exacto del pause
        } else {
          playIcon.className = 'fa-solid fa-play';
          playIcon.parentElement.style.paddingLeft = '4px';  // Compensación óptica del play
        }
      }

      // Interceptor de Handshake para streams de audio
      playerManager.setMessageInterceptor(
        cast.framework.messages.MessageType.LOAD,
        function(loadRequestData) {
          if (!loadRequestData || !loadRequestData.media) {
            return loadRequestData;
          }

          if (!loadRequestData.media.contentType) {
            loadRequestData.media.contentType = 'audio/mpeg'; 
          }

          return loadRequestData;
        }
      );

      // Enrutamiento de eventos nativos de la sesión Cast hacia el UI moderno
      playerManager.addEventListener(cast.framework.events.EventType.MEDIA_STATUS, function() {
        updateUI();
        updateBadgeAndButtons();
        updateProgress();
      });

      playerManager.addEventListener(cast.framework.events.EventType.TIME_UPDATE, function() {
        updateProgress();
      });

      playerManager.addEventListener(cast.framework.events.EventType.ERROR, function(e) {
        badgeEl.textContent = 'Error';
      });

      // Loop asíncrono para refrescar la barra de tiempo fluida (250ms)
      setInterval(function() {
        if (playerManager.getPlayerState() === 'PLAYING') {
          updateProgress();
        }
      }, 250);

      // Opciones de configuración de inicialización
      const options = new cast.framework.CastReceiverOptions();
      options.maxInactivity = 3600; 

      context.start(options);

    })();
  </script>
</body>
                </html>
