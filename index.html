<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harmoni Cast Receiver Pro</title>
  
  <script type="text/javascript" src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #ffffff;
    }

    /* FONDO ESPEJADO: Toma la carátula y la estira con blur masivo */
    #bg-blur {
      position: fixed;
      top: -10%;
      left: -10%;
      width: 120%;
      height: 120%;
      z-index: -1;
      object-fit: cover;
      filter: blur(70px) brightness(0.35) saturate(1.4);
      transition: src 0.8s ease-in-out, opacity 0.5s ease;
      opacity: 0;
    }

    /* Player nativo oculto visualmente pero activo en el núcleo */
    cast-media-player {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0;
    }

    /* Contenedor principal centrado para TV */
    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.5) 100%);
    }

    /* TARJETA DE CRISTAL (Glassmorphism) */
    .glass-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(35px);
      -webkit-backdrop-filter: blur(35px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 3.5rem;
      width: 85%;
      max-width: 920px;
      display: flex;
      gap: 3.5rem;
      align-items: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.75),
                  inset 0 1px 0 rgba(255,255,255,0.15);
    }

    /* Carátula flotante */
    .cover {
      width: 260px;
      height: 260px;
      background: rgba(255,255,255,0.03);
      border-radius: 18px;
      object-fit: cover;
      box-shadow: 0 22px 45px rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.18);
      flex-shrink: 0;
      display: none; /* Se activa dinámicamente por JS */
    }

    .text-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .title {
      font-size: 2.5rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.5px;
    }

    .artist {
      font-size: 1.4rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 1.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Badge de estado minimalista */
    .state-badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.08);
      padding: 0.35rem 1.1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 1.5rem;
    }

    /* Controles y progreso */
    .controls-area {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      width: 100%;
    }

    .progress-bar-bg {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      height: 6px;
      width: 100%;
      overflow: hidden;
    }

    .progress-fill {
      background: #ffffff;
      width: 0%;
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s linear;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.45);
    }

    /* Log de eventos sutil para Debug */
    .events-log {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      width: 280px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 0.6rem;
      font-family: monospace;
      font-size: 0.65rem;
      max-height: 120px;
      overflow-y: auto;
      color: #5fdd9d;
      z-index: 100;
      opacity: 0.25;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>

  <img id="bg-blur" src="" alt="">

  <cast-media-player></cast-media-player>

  <div id="ui-overlay">
    <div class="glass-card">
      
      <img id="coverImage" class="cover" src="" alt="Carátula">
      
      <div class="text-info">
        <div><span id="playerStateBadge" class="state-badge">En espera</span></div>
        <div class="title" id="mediaTitle">Harmoni</div>
        <div class="artist" id="mediaArtist">Conecta tu dispositivo...</div>
        
        <div class="controls-area">
          <div class="progress-bar-bg"><div id="progressFill" class="progress-fill"></div></div>
          <div class="time-row">
            <span id="currentTime">0:00</span>
            <span id="durationTime">0:00</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="events-log">
    <div id="eventLogContainer">🟢 Receptor Harmoni Listo</div>
  </div>

  <script>
    // Captura global de errores de JS directo a la mini consola del TV
    window.onerror = function(msg, url, line) {
      const d = document.getElementById('eventLogContainer');
      if (d) {
        d.innerHTML += '<div style="color:#ff8866;">🚨 JS: ' + msg + ' (L' + line + ')</div>';
        d.scrollTop = d.scrollHeight;
      }
    };

    (function() {
      'use strict';

      const context = cast.framework.CastReceiverContext.getInstance();
      const playerManager = context.getPlayerManager();

      // Referencias de Elementos de la UI
      const bgBlur        = document.getElementById('bg-blur');
      const coverImg      = document.getElementById('coverImage');
      const titleEl       = document.getElementById('mediaTitle');
      const artistEl      = document.getElementById('mediaArtist');
      const badgeEl       = document.getElementById('playerStateBadge');
      const progressFill  = document.getElementById('progressFill');
      const currentTimeEl = document.getElementById('currentTime');
      const durationEl    = document.getElementById('durationTime');
      const logDiv        = document.getElementById('eventLogContainer');

      function addLog(msg, isErr) {
        const t = new Date().toLocaleTimeString();
        const style = isErr ? 'color:#ff8866;' : '';
        logDiv.innerHTML += '<div style="' + style + '">📌 [' + t + '] ' + msg + '</div>';
        logDiv.scrollTop = logDiv.scrollHeight;
      }

      function fmtTime(s) {
        if (!isFinite(s) || isNaN(s) || s < 0) return '0:00';
        var m = Math.floor(s / 60);
        var sec = Math.floor(s % 60);
        return m + ':' + String(sec).padStart(2, '0');
      }

      function updateUI() {
        var info = playerManager.getMediaInformation();
        if (!info) return;

        var meta = info.metadata || {};
        titleEl.textContent  = meta.title || 'Canción Desconocida';
        artistEl.textContent = meta.artist || meta.albumArtist || 'Artista Desconocido';
        
        var imgs = meta.images || [];
        if (imgs.length > 0 && imgs[0].url) {
          coverImg.src = imgs[0].url;
          coverImg.style.display = 'block';
          
          bgBlur.src = imgs[0].url;
          bgBlur.style.opacity = '1';
        } else {
          coverImg.style.display = 'none';
          bgBlur.style.opacity = '0';
        }

        var dur = info.duration || 0;
        durationEl.textContent = fmtTime(dur);
      }

      function updateProgress() {
        var cur = playerManager.getCurrentTimeSec() || 0;
        var info = playerManager.getMediaInformation();
        var dur = info ? (info.duration || 0) : 0;
        
        currentTimeEl.textContent = fmtTime(cur);
        
        if (dur > 0) {
          var pct = (cur / dur) * 100;
          progressFill.style.width = Math.min(100, Math.max(0, pct)) + '%';
        }
      }

      function updateBadge() {
        var s = playerManager.getPlayerState();
        var map = {
          'PLAYING': '▶️ Reproduciendo',
          'PAUSED': '⏸️ Pausado',
          'BUFFERING': '⏳ Cargando...',
          'IDLE': '💤 En espera'
        };
        badgeEl.textContent = map[s] || '⚫ Listo';
      }

      // INTERCEPTOR MÁGICO: Evita fallos de Handshake con streams de audio de Android
      playerManager.setMessageInterceptor(
        cast.framework.messages.MessageType.LOAD,
        function(loadRequestData) {
          addLog('Petición LOAD recibida desde Harmoni app');
          
          if (!loadRequestData || !loadRequestData.media) {
            addLog('Error: Petición de carga nula', true);
            return loadRequestData;
          }

          // Forzar tipo de contenido genérico si Android no lo define explícitamente
          if (!loadRequestData.media.contentType) {
            loadRequestData.media.contentType = 'audio/mpeg'; 
          }

          addLog('Carga validada: ' + (loadRequestData.media.contentId || 'Streaming Audio'));
          return loadRequestData;
        }
      );

      // Suscriptores de Eventos del Player
      playerManager.addEventListener(cast.framework.events.EventType.LOAD_START, function() {
        addLog('Procesando pipeline de audio...');
      });

      playerManager.addEventListener(cast.framework.events.EventType.MEDIA_STATUS, function() {
        updateUI();
        updateBadge();
        updateProgress();
      });

      playerManager.addEventListener(cast.framework.events.EventType.TIME_UPDATE, function() {
        updateProgress();
      });

      playerManager.addEventListener(cast.framework.events.EventType.ERROR, function(e) {
        addLog('Error interno del player SDK: ' + (e.detailedErrorCode || 'Desconocido'), true);
        badgeEl.textContent = '❌ Error de códec';
      });

      // Render loop continuo para garantizar suavidad en la barra (250ms)
      setInterval(function() {
        if (playerManager.getPlayerState() === 'PLAYING') {
          updateProgress();
        }
      }, 250);

      // Configuración e inicio de contexto
      const options = new cast.framework.CastReceiverOptions();
      options.maxInactivity = 3600; // 1 hora de margen antes de desconectar por pausa

      context.start(options);
      addLog('🚀 Servidor de Cast Harmoni Corriendo');

    })();
  </script>
</body>
  </html>
